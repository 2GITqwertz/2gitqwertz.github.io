<!doctype html>
<html lang="en">
<head>

  <meta name="description" content="2GIT.de builds focused software with a link to the Breazee project page.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://2git.de/">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="2GIT.de">
  <meta property="og:title" content="2GIT.de">
  <meta property="og:description" content="Focused software and calm systems.">

  <meta property="og:image" content="https://2git.de/breazee/assets/App_Icon_Breazee.png">
  <meta property="og:image:alt" content="2GIT.de software studio homepage preview.">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="2GIT.de">
  <meta name="twitter:description" content="Focused software and calm systems.">
  <meta name="twitter:image" content="https://2git.de/breazee/assets/App_Icon_Breazee.png">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "2GIT.de",
      "url": "https://2git.de/",
      "email": "info@2git.de"
    }
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="site-shell">
    <main class="hero" aria-labelledby="hero-title">
      <div class="hero__copy">
        <p class="eyebrow">Software Studio</p>
        <h1 id="hero-title">2GIT.de</h1>
        <p class="hero__text">Focused software development, calm product thinking, and a preference for systems that stay understandable.</p>
        <a class="cta" href="/breazee/">Visit Breazee</a>
      </div>

      <section class="icon-stage" aria-label="Software development and think tank graphics">
        <article class="icon-card icon-card--code">
          <div class="window-chrome">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="code-lines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p>Software development</p>
        </article>

        <article class="icon-card icon-card--network">
          <div class="node-map" aria-hidden="true">
            <span class="node node-a"></span>
            <span class="node node-b"></span>
            <span class="node node-c"></span>
            <span class="node node-d"></span>
            <span class="link link-a"></span>
            <span class="link link-b"></span>
            <span class="link link-c"></span>
          </div>
          <p>Systems architecture</p>
        </article>

        <article class="icon-card icon-card--think">
          <div class="think-grid" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <i class="think-ring"></i>
          </div>
          <p>Think tank</p>
        </article>
      </section>
    </main>

    <footer class="footer">
      <a href="/impressum/" rel="nofollow">Imprint</a>
    </footer>
  </div>
</body>
</html>
